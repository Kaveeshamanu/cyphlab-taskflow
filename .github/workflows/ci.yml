name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://taskflow:taskflow@localhost:5432/taskflow_test
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret-at-least-32-characters
      CLIENT_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @taskflow/types
        run: pnpm --filter @taskflow/types build

      - name: Run migrations
        run: pnpm --filter @taskflow/api exec prisma migrate deploy

      - name: Test
        run: pnpm --filter @taskflow/api test:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage

# Phase 5 will add: build job (next build, docker build validation)
