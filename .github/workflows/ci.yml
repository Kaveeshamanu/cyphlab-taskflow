name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @taskflow/types build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

# Phase 3 will add: test job (Postgres service, prisma migrate deploy, vitest --coverage)
# Phase 5 will add: build job (next build, docker build validation)
