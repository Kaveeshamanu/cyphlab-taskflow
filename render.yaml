# Optional Render Blueprint — see docs/DEPLOYMENT.md §5 for how to use this.
# No secrets are committed here: `sync: false` fields prompt you for a value
# when you create the Blueprint instance; `generateValue: true` fields are
# generated by Render itself.

services:
  - type: web
    name: taskflow-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # paste Neon's DIRECT (non-pooled) connection string — see docs/DEPLOYMENT.md §4.2
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false # your Vercel production domain, no trailing slash — fix after Vercel is deployed
      - key: COOKIE_SAMESITE
        value: None
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: SMTP_HOST
        value: smtp.ethereal.email
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: 'false'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@taskflow.dev
      - key: STORAGE_DRIVER
        value: cloudinary # Render's disk is ephemeral — see docs/DEPLOYMENT.md §4.3
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
